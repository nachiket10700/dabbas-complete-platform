<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Dabba's</title>
    <style>
        .chat-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            background: white;
            border-radius: 20px;
            height: calc(100vh - 200px);
        }
        .chat-list {
            border-right: 1px solid #f0f0f0;
            overflow-y: auto;
        }
        .chat-item {
            padding: 1rem;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }
        .chat-item:hover {
            background: #fff5f0;
        }
        .chat-item.active {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
        }
        .chat-area {
            display: flex;
            flex-direction: column;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        .message {
            margin-bottom: 1rem;
            display: flex;
        }
        .message.sent {
            justify-content: flex-end;
        }
        .message-bubble {
            max-width: 70%;
            padding: 0.8rem 1rem;
            border-radius: 15px;
            background: #f5f5f5;
        }
        .message.sent .message-bubble {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
        }
    </style>
</head>
<body>
    <!-- Same navbar and sidebar -->
    <main class="main-content">
        <h1>Messages</h1>
        <div class="chat-container">
            <div class="chat-list">
                <!-- Chat items -->
            </div>
            <div class="chat-area">
                <div class="messages" id="messages">
                    <!-- Messages -->
                </div>
                <div class="message-input">
                    <input type="text" placeholder="Type a message...">
                    <button><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
