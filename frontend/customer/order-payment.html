<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Payment - Dabba's Tiffin Service Nashik</title>

    <link rel="stylesheet" href="/frontend/assets/css/style.css">
    <link rel="stylesheet" href="/frontend/assets/css/customer.css">
    <link rel="stylesheet" href="/frontend/assets/css/payments.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fc;
            color: #2d2d2d;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1rem 2rem;
            background: white;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .logo span {
            background: linear-gradient(135deg, #4ecdc4, #45b7af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .location-selector {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #f5f5f5;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            cursor: pointer;
        }

        .location-selector i {
            color: #ff6b6b;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            padding: 0.5rem 1rem;
            background: #f5f5f5;
            border-radius: 50px;
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 70px;
            width: 280px;
            height: calc(100vh - 70px);
            background: white;
            border-right: 1px solid #f0f0f0;
            padding: 2rem 1rem;
            overflow-y: auto;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            color: #666;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .nav-link i {
            width: 20px;
            color: #ff6b6b;
        }

        .nav-link:hover, .nav-link.active {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
        }

        .nav-link:hover i, .nav-link.active i {
            color: white;
        }

        .main-content {
            margin-left: 280px;
            margin-top: 70px;
            padding: 2rem;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
        }

        .back-link {
            color: #ff6b6b;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Order Summary Card */
        .summary-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid #f0f0f0;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #f0f0f0;
        }

        .order-id {
            color: #ff6b6b;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .tiffin-icon-large {
            font-size: 3rem;
            background: #fff5f0;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1rem;
        }

        .order-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .detail-icon {
            width: 40px;
            height: 40px;
            background: #f0f0f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff6b6b;
        }

        .detail-text h4 {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.2rem;
        }

        .detail-text p {
            font-weight: 600;
        }

        .customization-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 1rem 0;
        }

        .custom-tag {
            background: #e3f2fd;
            color: #1976d2;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
        }

        .special-request-box {
            background: #fff3cd;
            color: #856404;
            padding: 0.8rem;
            border-radius: 10px;
            margin: 1rem 0;
            font-size: 0.9rem;
        }

        .price-breakdown {
            background: #f8f9fc;
            border-radius: 15px;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px dashed #e0e0e0;
        }

        .price-row:last-child {
            border-bottom: none;
        }

        .price-row.total {
            font-weight: 700;
            font-size: 1.2rem;
            padding-top: 1rem;
        }

        .price-row.total .amount {
            color: #ff6b6b;
        }

        /* Payment Options */
        .payment-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .payment-option {
            background: white;
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .payment-option:hover {
            border-color: #ff6b6b;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.1);
        }

        .payment-option.selected {
            border-color: #ff6b6b;
            background: #fff5f0;
        }

        .payment-option input[type="radio"] {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 20px;
            height: 20px;
            accent-color: #ff6b6b;
        }

        .payment-icon {
            font-size: 2rem;
            color: #ff6b6b;
            margin-bottom: 1rem;
        }

        /* Pay Button */
        .pay-btn {
            width: 100%;
            padding: 1.5rem;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .pay-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(255, 107, 107, 0.4);
        }

        .pay-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Payment History Section */
        .history-section {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            margin-top: 2rem;
            border: 1px solid #f0f0f0;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .history-header h2 {
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .history-header h2 i {
            color: #ff6b6b;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: #f8f9fc;
            border-radius: 10px;
            border-left: 4px solid #ff6b6b;
            transition: all 0.3s ease;
        }

        .history-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.1);
        }

        .history-info h4 {
            font-size: 1rem;
            margin-bottom: 0.3rem;
        }

        .history-info p {
            font-size: 0.85rem;
            color: #666;
        }

        .history-amount {
            font-weight: 700;
            color: #ff6b6b;
            font-size: 1.1rem;
        }

        .receipt-btn {
            background: none;
            border: 2px solid #ff6b6b;
            color: #ff6b6b;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 1rem;
        }

        .receipt-btn:hover {
            background: #ff6b6b;
            color: white;
        }

        /* Receipt Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
        }

        .modal-content {
            background: white;
            max-width: 500px;
            margin: 2rem auto;
            padding: 2rem;
            border-radius: 20px;
            position: relative;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 2rem;
            cursor: pointer;
            color: #999;
        }

        .close:hover {
            color: #ff6b6b;
        }

        .receipt {
            background: #fff;
            padding: 1.5rem;
            border-radius: 15px;
        }

        .receipt-header {
            text-align: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px dashed #f0f0f0;
        }

        .receipt-header h3 {
            color: #ff6b6b;
            margin-bottom: 0.3rem;
            font-size: 1.5rem;
        }

        .receipt-header p {
            color: #666;
            font-size: 0.9rem;
        }

        .receipt-details {
            margin-bottom: 1.5rem;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px dotted #f0f0f0;
        }

        .receipt-row:last-child {
            border-bottom: none;
        }

        .receipt-total {
            font-weight: 700;
            font-size: 1.2rem;
            color: #ff6b6b;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
        }

        .print-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .print-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.3);
        }

        /* Alert */
        .alert {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .main-content {
                margin-left: 0;
            }
            .payment-options {
                grid-template-columns: 1fr;
            }
            .order-details {
                grid-template-columns: 1fr;
            }
            .history-item {
                flex-direction: column;
                gap: 0.5rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <a href="/frontend/index.html" class="logo">Dabba<span>'s</span></a>
        <div class="nav-right">
            <div class="location-selector">
                <i class="fas fa-location-dot"></i>
                <span id="selectedCity">Nashik</span>
                <i class="fas fa-chevron-down"></i>
            </div>
            <div class="user-menu">
                <div class="user-avatar" id="userInitials">P</div>
                <span id="userName">Pranjal</span>
                <i class="fas fa-chevron-down"></i>
            </div>
        </div>
    </nav>

    <!-- Sidebar -->
    <aside class="sidebar">
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="dashboard.html" class="nav-link">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="browse-meals.html" class="nav-link active">
                    <i class="fas fa-utensils"></i>
                    <span>Browse Tiffin</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="subscriptions.html" class="nav-link">
                    <i class="fas fa-calendar-alt"></i>
                    <span>My Subscription</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="orders.html" class="nav-link">
                    <i class="fas fa-shopping-bag"></i>
                    <span>My Orders</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="favorites.html" class="nav-link">
                    <i class="fas fa-heart"></i>
                    <span>Favorite Tiffins</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="payments.html" class="nav-link">
                    <i class="fas fa-credit-card"></i>
                    <span>Payments</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="support.html" class="nav-link">
                    <i class="fas fa-headset"></i>
                    <span>Support</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="settings.html" class="nav-link">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="page-header">
            <h1>Complete Payment</h1>
            <a href="javascript:history.back()" class="back-link">
                <i class="fas fa-arrow-left"></i> Back
            </a>
        </div>

        <!-- Alert Container -->
        <div id="alertContainer"></div>

        <!-- Order Summary -->
        <div class="summary-card" id="orderSummary">
            <div style="text-align: center; padding: 2rem;">
                <i class="fas fa-spinner fa-pulse" style="font-size: 2rem; color: #ff6b6b;"></i>
                <p>Loading order details...</p>
            </div>
        </div>

        <!-- Payment Methods -->
        <h2 style="margin: 2rem 0 1rem;">Select Payment Method</h2>
        
        <div class="payment-options">
            <label class="payment-option" onclick="selectPaymentMethod('upi')">
                <input type="radio" name="payment" value="upi" checked>
                <div class="payment-icon">
                    <i class="fas fa-mobile-alt"></i>
                </div>
                <h3>UPI</h3>
                <p>Google Pay, PhonePe, Paytm</p>
            </label>

            <label class="payment-option" onclick="selectPaymentMethod('card')">
                <input type="radio" name="payment" value="card">
                <div class="payment-icon">
                    <i class="fas fa-credit-card"></i>
                </div>
                <h3>Credit/Debit Card</h3>
                <p>Visa, MasterCard, RuPay</p>
            </label>

            <label class="payment-option" onclick="selectPaymentMethod('cash')">
                <input type="radio" name="payment" value="cash">
                <div class="payment-icon">
                    <i class="fas fa-money-bill-wave"></i>
                </div>
                <h3>Cash on Delivery</h3>
                <p>Pay when you receive</p>
            </label>
        </div>

        <!-- Pay Button -->
        <button class="pay-btn" id="payBtn" onclick="processOrderPayment()">
            Pay ₹<span id="totalAmount">0</span>
        </button>

        <!-- Payment History Section -->
        <div class="history-section">
            <div class="history-header">
                <h2><i class="fas fa-history"></i> Order Payment History</h2>
                <span style="color: #ff6b6b; font-size: 0.9rem;">Last 10 transactions</span>
            </div>
            <div class="history-list" id="paymentHistory">
                <!-- History will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Receipt Modal -->
    <div id="receiptModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeReceiptModal()">&times;</span>
            <div class="receipt" id="receiptContent">
                <!-- Receipt will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        const username = localStorage.getItem('username') || 'Pranjal';
        const firstName = username.split(' ')[0] || 'Pranjal';
        
        document.getElementById('userName').textContent = firstName;
        document.getElementById('userInitials').textContent = firstName.charAt(0);
        document.getElementById('selectedCity').textContent = 'Nashik';

        // Get pending order from localStorage
        const pendingOrder = JSON.parse(localStorage.getItem('pendingOrder'));

        // Payment history array for ORDERS (separate from subscriptions)
        let paymentHistory = JSON.parse(localStorage.getItem('orderPaymentHistory')) || [];

        // Redirect if no order
        if (!pendingOrder) {
            window.location.href = 'browse-meals.html';
        }

        // ==================== DISPLAY FUNCTIONS ====================
        function displayOrder() {
            const container = document.getElementById('orderSummary');
            
            document.getElementById('totalAmount').textContent = pendingOrder.totalAmount;

            // Format meal type for display
            const mealDisplay = pendingOrder.mealType === 'lunch' ? 'Lunch' : 
                               (pendingOrder.mealType === 'dinner' ? 'Dinner' : 'Lunch + Dinner');
            
            // Format day
            const dayDisplay = pendingOrder.day === 'today' ? 'Today' : 'Tomorrow';

            container.innerHTML = `
                <div class="order-header">
                    <div>
                        <span class="order-id">Order #${pendingOrder.id}</span>
                    </div>
                    <span style="background: #fff5f0; padding: 0.5rem 1rem; border-radius: 50px; color: #ff6b6b;">
                        ${mealDisplay} • ${dayDisplay}
                    </span>
                </div>

                <div style="display: flex; align-items: center; margin-bottom: 2rem;">
                    <div class="tiffin-icon-large">${pendingOrder.icon || '🍛'}</div>
                    <div>
                        <h2 style="margin-bottom: 0.3rem;">${pendingOrder.name}</h2>
                        <p style="color: #666;"><i class="fas fa-map-marker-alt" style="color: #ff6b6b;"></i> ${pendingOrder.area}, Nashik</p>
                    </div>
                </div>

                <div class="order-details">
                    <div class="detail-item">
                        <div class="detail-icon">
                            <i class="fas fa-clock"></i>
                        </div>
                        <div class="detail-text">
                            <h4>Delivery Time</h4>
                            <p>${pendingOrder.deliveryTime}</p>
                        </div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-icon">
                            <i class="fas fa-calendar"></i>
                        </div>
                        <div class="detail-text">
                            <h4>Delivery Date</h4>
                            <p>${pendingOrder.date}</p>
                        </div>
                    </div>
                </div>

                <div style="background: #f8f9fc; padding: 1rem; border-radius: 10px; margin: 1rem 0;">
                    <h4 style="margin-bottom: 0.5rem; color: #ff6b6b;">Your Order:</h4>
                    <ul style="list-style: none;">
                        ${pendingOrder.menu.map(item => `
                            <li style="padding: 0.3rem 0; display: flex; align-items: center; gap: 0.5rem;">
                                <i class="fas fa-check-circle" style="color: #4caf50;"></i>
                                ${item}
                            </li>
                        `).join('')}
                    </ul>
                </div>

                ${pendingOrder.customizations && pendingOrder.customizations.length > 0 ? `
                    <div class="customization-tags">
                        ${pendingOrder.customizations.map(c => {
                            const name = c === 'extra-roti' ? 'Extra Roti' : 
                                       (c === 'extra-rice' ? 'Extra Rice' : 
                                       (c === 'extra-sabji' ? 'Extra Sabji' : c));
                            return `<span class="custom-tag">${name}</span>`;
                        }).join('')}
                    </div>
                ` : ''}

                ${pendingOrder.specialRequest ? `
                    <div class="special-request-box">
                        <i class="fas fa-info-circle"></i>
                        ${pendingOrder.specialRequest}
                    </div>
                ` : ''}

                <div class="price-breakdown">
                    <div class="price-row">
                        <span>Base Price</span>
                        <span>₹${pendingOrder.basePrice}</span>
                    </div>
                    ${pendingOrder.customizations && pendingOrder.customizations.filter(c => 
                        ['extra-roti', 'extra-rice', 'extra-sabji'].includes(c)
                    ).map(c => {
                        const name = c === 'extra-roti' ? 'Extra Roti' : 
                                   (c === 'extra-rice' ? 'Extra Rice' : 'Extra Sabji');
                        const price = c === 'extra-roti' ? 10 : (c === 'extra-rice' ? 15 : 20);
                        return `
                            <div class="price-row">
                                <span>+ ${name}</span>
                                <span>+₹${price}</span>
                            </div>
                        `;
                    }).join('')}
                    <div class="price-row">
                        <span>GST (5%)</span>
                        <span>₹${pendingOrder.gst}</span>
                    </div>
                    <div class="price-row total">
                        <span>Total Amount</span>
                        <span class="amount">₹${pendingOrder.totalAmount}</span>
                    </div>
                </div>
            `;
        }

        // Load payment history
        function loadPaymentHistory() {
            const container = document.getElementById('paymentHistory');
            
            if (paymentHistory.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #666; padding: 1rem;">No payment history yet</p>';
                return;
            }

            // Show last 10 transactions (most recent first)
            const recentPayments = paymentHistory.slice(-10).reverse();
            
            container.innerHTML = recentPayments.map(payment => `
                <div class="history-item">
                    <div class="history-info">
                        <h4>${payment.name}</h4>
                        <p>${payment.date} • ${payment.paymentMethod} • ${payment.mealType}</p>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <span class="history-amount">₹${payment.amount}</span>
                        <button class="receipt-btn" onclick="viewReceipt('${payment.id}')">
                            <i class="fas fa-receipt"></i> Receipt
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ==================== PAYMENT FUNCTIONS ====================
        window.selectPaymentMethod = function(method) {
            document.querySelectorAll('.payment-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
        };

        // Process payment and generate receipt
        window.processOrderPayment = function() {
            const payBtn = document.getElementById('payBtn');
            payBtn.disabled = true;
            payBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Processing...';

            setTimeout(() => {
                // Get selected payment method
                const selectedMethod = document.querySelector('input[name="payment"]:checked').value;
                
                // Generate receipt number and transaction ID
                const receiptNo = 'RCP' + Math.floor(Math.random() * 1000000);
                const transactionId = 'TXN' + Date.now();
                
                // Create transaction record
                const transaction = {
                    id: 'PAY' + Date.now(),
                    receiptNo: receiptNo,
                    transactionId: transactionId,
                    name: pendingOrder.name,
                    mealType: pendingOrder.mealType,
                    day: pendingOrder.day,
                    amount: pendingOrder.amount,
                    gst: pendingOrder.gst,
                    totalAmount: pendingOrder.totalAmount,
                    basePrice: pendingOrder.basePrice,
                    customizations: pendingOrder.customizations,
                    paymentMethod: selectedMethod,
                    date: new Date().toLocaleDateString('en-IN', { 
                        year: 'numeric', 
                        month: 'short', 
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    }),
                    type: 'order',
                    status: 'success'
                };

                // Add to payment history (for orders)
                paymentHistory.push(transaction);
                localStorage.setItem('orderPaymentHistory', JSON.stringify(paymentHistory));
                
                // Update order status to confirmed
                const confirmedOrder = {
                    ...pendingOrder,
                    status: 'confirmed',
                    paymentStatus: 'paid',
                    paymentMethod: selectedMethod,
                    paymentDate: transaction.date,
                    receiptNo: receiptNo,
                    transactionId: transactionId
                };

                // Get existing orders or initialize empty array
                let orders = JSON.parse(localStorage.getItem('orders') || '[]');
                orders.push(confirmedOrder);
                localStorage.setItem('orders', JSON.stringify(orders));
                
                // Clear pending order
                localStorage.removeItem('pendingOrder');

                // Debug logs
                console.log('✅ Order saved to localStorage:');
                console.log('orders:', orders);
                console.log('orderPaymentHistory:', paymentHistory);
                
                showAlert('✅ Payment successful! Your order is confirmed.', 'success');
                
                // Reload payment history
                loadPaymentHistory();

                setTimeout(() => {
                    window.location.href = 'orders.html';
                }, 2000);
            }, 2000);
        };

        // ==================== RECEIPT FUNCTIONS ====================
        window.viewReceipt = function(paymentId) {
            const payment = paymentHistory.find(p => p.id === paymentId);
            
            if (!payment) return;
            
            // Format meal type
            const mealDisplay = payment.mealType === 'lunch' ? 'Lunch' : 
                               (payment.mealType === 'dinner' ? 'Dinner' : 'Lunch + Dinner');
            
            const receiptContent = document.getElementById('receiptContent');
            receiptContent.innerHTML = `
                <div class="receipt-header">
                    <h3>Dabba's Tiffin Service</h3>
                    <p>Payment Receipt</p>
                </div>
                <div class="receipt-details">
                    <div class="receipt-row">
                        <span>Receipt No:</span>
                        <span>${payment.receiptNo}</span>
                    </div>
                    <div class="receipt-row">
                        <span>Transaction ID:</span>
                        <span>${payment.transactionId}</span>
                    </div>
                    <div class="receipt-row">
                        <span>Date & Time:</span>
                        <span>${payment.date}</span>
                    </div>
                    <div class="receipt-row">
                        <span>Tiffin Service:</span>
                        <span>${payment.name}</span>
                    </div>
                    <div class="receipt-row">
                        <span>Meal:</span>
                        <span>${mealDisplay} - ${payment.day}</span>
                    </div>
                    <div class="receipt-row">
                        <span>Payment Method:</span>
                        <span>${payment.paymentMethod}</span>
                    </div>
                    <div class="receipt-row">
                        <span>Base Amount:</span>
                        <span>₹${payment.basePrice}</span>
                    </div>
                    ${payment.customizations && payment.customizations.filter(c => 
                        ['extra-roti', 'extra-rice', 'extra-sabji'].includes(c)
                    ).map(c => {
                        const name = c === 'extra-roti' ? 'Extra Roti' : 
                                   (c === 'extra-rice' ? 'Extra Rice' : 'Extra Sabji');
                        const price = c === 'extra-roti' ? 10 : (c === 'extra-rice' ? 15 : 20);
                        return `
                            <div class="receipt-row">
                                <span>${name}:</span>
                                <span>+₹${price}</span>
                            </div>
                        `;
                    }).join('')}
                    <div class="receipt-row">
                        <span>GST (5%):</span>
                        <span>₹${payment.gst}</span>
                    </div>
                    <div class="receipt-total">
                        <span>Total Paid:</span>
                        <span>₹${payment.totalAmount}</span>
                    </div>
                </div>
                <button class="print-btn" onclick="window.print()">
                    <i class="fas fa-print"></i> Print Receipt
                </button>
            `;
            
            document.getElementById('receiptModal').style.display = 'block';
        };

        window.closeReceiptModal = function() {
            document.getElementById('receiptModal').style.display = 'none';
        };

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('receiptModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };

        // ==================== UTILITY FUNCTIONS ====================
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };
            
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    <i class="fas ${icons[type]}"></i>
                    <span>${message}</span>
                </div>
            `;

            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 3000);
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = 'login.html';
        });

        // Initialize
        displayOrder();
        loadPaymentHistory();
    </script>
</body>
</html>
